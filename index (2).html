<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Building Care System Enterprise v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <!-- ============================================ -->
    <!-- SINGLE CARD - REPORT                         -->
    <!-- ============================================ -->
    <div class="w-full max-w-md bg-[#1e5eff] rounded-3xl shadow-xl overflow-hidden flex flex-col h-[850px]">

        <!-- Header -->
        <div class="h-6 w-full bg-[#1e5eff]"></div>
        <div class="p-5 flex items-center justify-between text-white">
            <div class="flex items-center gap-4">
                <button class="text-xl"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <h2 class="font-bold text-lg flex items-center gap-1">Halo, Tukang Lapor <span>👋</span></h2>
                    <p class="text-xs text-blue-200">General Affair</p>
                </div>
            </div>
            <button class="text-lg"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <!-- Content -->
        <div class="flex-1 bg-white rounded-t-[2rem] p-6 overflow-y-auto space-y-5">
            
            <!-- Lokasi -->
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Lokasi Kerusakan</label>
                <input type="text" placeholder="Contoh : Ruang Meeting" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:border-[#1e5eff] text-sm">
            </div>

            <!-- Kategori -->
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Kategori Kerusakan</label>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="border-2 border-[#1e5eff] rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer bg-blue-50/30 text-[#1e5eff]">
                        <i class="fa-solid fa-bolt text-xl mb-1"></i>
                        <span class="text-xs font-bold">LISTRIK</span>
                    </div>
                    <div class="border border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-gray-300 text-gray-600">
                        <i class="fa-solid fa-snowflake text-xl mb-1"></i>
                        <span class="text-xs font-bold">AC</span>
                    </div>
                </div>
                <div class="border border-gray-200 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-gray-300 text-gray-600">
                    <i class="fa-solid fa-building text-xl mb-1"></i>
                    <span class="text-xs font-bold">KONDISI BANGUNAN</span>
                </div>
            </div>

            <!-- Prioritas -->
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Prioritas</label>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 w-full border border-green-500 bg-green-50/20 px-4 py-3 rounded-xl cursor-pointer">
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        <span class="text-sm font-bold text-gray-700">NORMAL</span>
                    </label>
                    <label class="flex items-center gap-3 w-full border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:border-gray-300">
                        <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                        <span class="text-sm font-bold text-gray-700">HIGH</span>
                    </label>
                    <label class="flex items-center gap-3 w-full border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:border-gray-300">
                        <span class="w-3 h-3 rounded-full bg-red-500"></span>
                        <span class="text-sm font-bold text-gray-700">URGENT</span>
                    </label>
                </div>
            </div>

            <!-- Deskripsi -->
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Deskripsi Kerusakan</label>
                <textarea rows="3" placeholder="Jelaskan kerusakan secara detail..." class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-none focus:border-[#1e5eff] text-sm resize-none"></textarea>
                <span class="block text-right text-xs text-gray-400 mt-1">0 / 500 karakter</span>
            </div>

            <!-- Foto -->
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Foto Kerusakan</label>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button class="bg-[#1e5eff] text-white py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 shadow-sm"><i class="fa-solid fa-camera"></i> Ambil Foto</button>
                    <button class="bg-gray-100 text-gray-700 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 hover:bg-gray-200"><i class="fa-solid fa-image"></i> Galeri</button>
                </div>
                <div class="border border-dashed border-gray-300 bg-gray-50 rounded-xl p-6 flex flex-col items-center justify-center text-center text-gray-400">
                    <i class="fa-regular fa-image text-3xl mb-2"></i>
                    <p class="text-xs font-semibold text-gray-500">Belum Ada Foto</p>
                    <p class="text-[11px] text-gray-400">Ambil foto atau pilih dari galeri</p>
                </div>
            </div>

            <!-- Submit -->
            <button class="w-full bg-[#1e5eff] text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md hover:bg-blue-700 transition">
                <i class="fa-solid fa-paper-plane text-sm"></i> Kirim Report
            </button>
        </div>

        <!-- Navigation Bottom -->
        <div class="bg-white border-t border-gray-100 py-3 grid grid-cols-2 text-center">
            <a href="report.html" class="text-[#1e5eff] flex flex-col items-center justify-center gap-1">
                <i class="fa-solid fa-file-invoice text-lg"></i>
                <span class="text-[11px] font-bold">Report</span>
            </a>
            <a href="history.html" class="text-gray-400 flex flex-col items-center justify-center gap-1 hover:text-gray-600">
                <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                <span class="text-[11px] font-bold">History</span>
            </a>
        </div>
    </div>

</body>
</html>
